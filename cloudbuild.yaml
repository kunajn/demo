steps:
# 1. Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/gcr.io/my-nginx-app:$SHORT_SHA', '.']

# 2. Push the container image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/gcr.io/my-nginx-app:$SHORT_SHA']

# 3. Create a release in Cloud Deploy
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - 'deploy'
    - 'releases'
    - 'create'
    - 'release-$SHORT_SHA'
    - '--delivery-pipeline=nginx-pipeline'
    - '--region=us-central1'
    - '--images=your-docker-registry/my-nginx-app=us-central1-docker.pkg.dev/$PROJECT_ID/gcr.io/my-nginx-app:$SHORT_SHA'